<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Live feed of fresh, unassigned open-source issues in popular JavaScript, TypeScript, Python, Go, Rust and Java repos. Claim before anyone else.">
<meta property="og:title" content="open source feed · fresh, unassigned, claimable issues">
<meta property="og:description" content="New contribution-ready issues from 100★+ repos, minutes after they're opened. Filter by language, labels and stars.">

<link rel="alternate" type="application/atom+xml" title="open source feed" href="/feed.xml">
<style>
  :root {
    --bg: #ffffff; --ink: #111827; --muted: #6b7280; --faint: #9ca3af;
    --hair: #e5e7eb; --hover-bg: #f9fafb; --input-border: #d1d5db;
    --accent: #2563eb; --accent-ink: #ffffff; --green: #16a34a;
    --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --ink: #e6edf3; --muted: #8b949e; --faint: #6e7681;
      --hair: #21262d; --hover-bg: #161b22; --input-border: #30363d;
      --accent: #3b82f6; --accent-ink: #ffffff; --green: #3fb950;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.5 var(--sans); }
  button { font-family: var(--sans); }

  /* ---------- top bar ---------- */
  .topbar { position: sticky; top: 0; z-index: 30; background: var(--bg); border-bottom: 1px solid var(--hair); }
  .topbar-inner { padding: 15px 24px; display: flex; align-items: center; gap: 20px; }
  .wordmark { font-size: 19px; font-weight: 800; letter-spacing: -.4px; white-space: nowrap; }
  .wordmark em { font-style: normal; color: var(--accent); }
  .nav-right { margin-left: auto; display: flex; align-items: center; }
  .nav-right > * { padding: 0 16px; border-left: 1px solid var(--hair); white-space: nowrap; }
  .nav-right > *:first-child { border-left: 0; }
  .nav-right > *:last-child { padding-right: 0; }
  a.rss, a.nav-about { font-size: 13.5px; font-weight: 500; color: var(--muted); text-decoration: none; }
  a.rss:hover, a.nav-about:hover { color: var(--accent); }

  /* ---------- shell: sidebar + main ---------- */
  .shell { display: flex; min-height: calc(100vh - 58px); }
  .sidebar {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--hair);
    padding: 24px 24px 32px; position: sticky; top: 58px;
    height: calc(100vh - 58px); overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .side-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--faint); margin: 0 0 12px;
  }
  .presets { display: flex; flex-direction: column; gap: 2px; margin-bottom: 24px; }
  .preset {
    background: none; border: 0; text-align: left; cursor: pointer;
    padding: 7px 10px; margin: 0 -10px; border-radius: 7px;
    font-size: 14px; color: var(--ink);
    display: flex; align-items: center; gap: 10px;
  }
  .preset svg {
    width: 14px; height: 14px; flex-shrink: 0;
    fill: none; stroke: var(--faint); stroke-width: 1.4; stroke-linejoin: round;
  }
  .preset:hover { background: var(--hover-bg); }
  .preset:hover svg { stroke: var(--muted); }
  .preset.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, var(--bg)); font-weight: 600; }
  .preset.active svg { stroke: var(--accent); }
  .side-divider { border: 0; border-top: 1px solid var(--hair); margin: 0 0 24px; }

  form { display: flex; flex-direction: column; gap: 16px; }
  form label { display: flex; flex-direction: column; gap: 6px; font-size: 12.5px; color: var(--muted); }
  form input, form select {
    background: var(--bg); color: var(--ink); border: 1px solid var(--input-border);
    border-radius: 8px; padding: 9px 12px; font: 14px var(--sans); width: 100%;
  }
  form input:focus, form select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .clear-all {
    background: none; border: 0; color: var(--muted); font-size: 13.5px;
    cursor: pointer; padding: 12px; margin-top: 10px;
  }
  .clear-all:hover { color: var(--ink); }

  .main { flex: 1; min-width: 0; }

  /* ---------- list header ---------- */
  .list-head {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 16px 28px; border-bottom: 1px solid var(--hair);
  }
  .count { font-size: 14.5px; }
  .count b { font-weight: 700; }
  .count .sortedby { color: var(--muted); margin-left: 6px; }
  .tools { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .tools select {
    background: var(--bg); color: var(--ink); border: 1px solid var(--input-border);
    border-radius: 8px; padding: 7px 10px; font: 13.5px var(--sans); cursor: pointer;
  }
  .search {
    display: flex; align-items: center; gap: 7px;
    border: 1px solid var(--input-border); border-radius: 8px; padding: 7px 12px;
  }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
  .search svg { width: 14px; height: 14px; stroke: var(--faint); flex-shrink: 0; }
  .search input { border: 0; background: none; color: var(--ink); font: 13.5px var(--sans); width: 150px; }
  .search input:focus { outline: none; }
  .filters-toggle {
    display: none; background: var(--bg); border: 1px solid var(--input-border);
    border-radius: 8px; padding: 7px 12px; font-size: 13.5px; color: var(--ink); cursor: pointer;
  }

  /* ---------- issue rows ---------- */
  ul { list-style: none; margin: 0; padding: 0; }
  li.issue {
    display: flex; gap: 20px; align-items: flex-start;
    padding: 17px 28px; border-bottom: 1px solid var(--hair);
    animation: appear .25s ease backwards;
  }
  li.issue:hover { background: var(--hover-bg); }
  @keyframes appear { from { opacity: 0; } }
  .row-main { flex: 1; min-width: 0; }
  .title-line { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; flex-wrap: wrap; }
  .new-pill {
    background: color-mix(in srgb, var(--green) 10%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--green) 30%, var(--bg));
    color: var(--green); font-size: 10px; font-weight: 700;
    letter-spacing: .6px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .title-line a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15.5px; letter-spacing: -.1px; }
  .title-line a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .lang { display: inline-flex; align-items: center; gap: 6px; }
  .lang i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  a.repo { color: var(--muted); text-decoration: none; font-weight: 500; }
  a.repo:hover { color: var(--accent); }
  .stars { display: inline-flex; align-items: center; gap: 4px; font-variant-numeric: tabular-nums; }
  .stars svg { width: 13px; height: 13px; fill: var(--faint); }
  .bm .p-fill { display: none; }
  .bm.saved .p-fill { display: block; }
  .bm.saved .p-outline { display: none; }
  .pill {
    border: 0; cursor: pointer; border-radius: 999px; padding: 3px 11px;
    font-size: 12px; font-weight: 500;
  }
  .row-side {
    flex-shrink: 0; display: flex; align-items: center; gap: 16px;
    font-size: 12.5px; color: var(--muted); padding-top: 2px;
  }
  .comments { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); }
  .comments.has { color: var(--accent); font-weight: 600; }
  .comments svg { width: 14px; height: 14px; fill: currentColor; }
  /* Bookmark: hidden until the row is hovered (always visible once saved),
     so the resting row stays uncluttered. */
  .bm {
    display: inline-flex; align-items: center; background: none; border: 0; cursor: pointer;
    padding: 2px; color: var(--muted); line-height: 0; opacity: 0;
    transition: color .12s ease, opacity .12s ease;
  }
  li.issue:hover .bm { opacity: 1; }
  .bm svg { width: 14px; height: 14px; fill: currentColor; }
  .bm:hover { color: var(--accent); }
  .bm.saved { color: var(--accent); opacity: 1; }
  .sync { font-size: 12.5px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .sync:empty { display: none; }
  .nav-bm {
    display: inline-flex; align-items: center; gap: 7px; background: none; cursor: pointer;
    border: 0; color: var(--muted); font-size: 13.5px; font-weight: 500; transition: color .12s ease;
  }
  .nav-bm svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
  .nav-bm:hover { color: var(--accent); }
  .nav-bm.active { color: var(--accent); font-weight: 600; }
  .nav-bm .cnt {
    background: var(--hover-bg); border: 1px solid var(--hair); border-radius: 999px;
    padding: 0 7px; font-size: 11px; line-height: 17px; color: var(--muted);
  }
  .nav-bm.active .cnt { color: var(--accent); }

  /* ---------- skeleton / states ---------- */
  .skel { height: 72px; border-bottom: 1px solid var(--hair); position: relative; overflow: hidden; }
  .skel::before, .skel::after {
    content: ""; position: absolute; left: 28px; border-radius: 4px;
    background: linear-gradient(100deg, var(--hover-bg) 40%, var(--hair) 50%, var(--hover-bg) 60%);
    background-size: 200% 100%; animation: shimmer 1.1s linear infinite;
  }
  .skel::before { top: 17px; height: 15px; right: 22%; }   /* title line */
  .skel::after { bottom: 17px; height: 11px; right: 52%; } /* meta line */
  /* stagger widths so the list doesn't look like a grid of identical bars */
  .skel:nth-child(2n)::before { right: 34%; }
  .skel:nth-child(3n)::before { right: 15%; }
  .skel:nth-child(2n)::after { right: 60%; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .more {
    display: block; margin: 22px auto; background: var(--bg); color: var(--muted);
    border: 1px solid var(--input-border); border-radius: 8px; padding: 9px 30px;
    font-size: 13.5px; cursor: pointer;
  }
  .more:hover { color: var(--accent); border-color: var(--accent); }
  /* author display:block beats the hidden attribute's UA rule; restore it */
  .more[hidden] { display: none; }
  .bm-exit { font-size: 13.5px; font-weight: 500; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .bm-exit:hover { text-decoration: underline; }
  .empty, .error { padding: 56px 24px; text-align: center; font-size: 14px; color: var(--muted); }
  .error { color: #dc2626; }
  footer { padding: 8px 28px 36px; font-size: 12.5px; color: var(--faint); }
  footer a { color: var(--faint); }
  footer a:hover { color: var(--accent); }

  .backdrop { display: none; }

  /* ---------- mobile ---------- */
  @media (max-width: 840px) {
    .topbar-inner { padding: 13px 16px; gap: 12px; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; width: min(85vw, 320px);
      background: var(--bg); height: 100vh; transform: translateX(-105%);
      transition: transform .22s ease; box-shadow: 0 0 40px rgba(0,0,0,.25);
    }
    body.side-open .sidebar { transform: none; }
    body.side-open .backdrop { display: block; position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.35); }
    .filters-toggle { display: inline-flex; }
    .list-head { padding: 12px 16px; }
    li.issue { padding: 14px 16px; gap: 12px; }
    .title-line a { font-size: 14.5px; }
    .meta { gap: 11px; font-size: 12px; }
    .search input { width: 90px; }
    footer { padding: 8px 16px 32px; }
    .bm { opacity: 1; }            /* no hover on touch screens */
    .sync { display: none; }       /* keep the top bar to essentials */
    .nav-right > * { padding: 0 10px; }
  }
  /* phone widths: the long wordmark + full nav exceed the viewport, so
     drop secondary text and keep icon/count/links only */
  @media (max-width: 600px) {
    .topbar-inner { gap: 10px; }
    .wordmark { font-size: 16.5px; }
    .bm-label { display: none; }   /* bookmark icon + count still shown */
    .nav-right > .nav-bm { border-left: 0; }  /* .sync hidden here, so Bookmarks is visually first */
    .nav-right > * { padding: 0 8px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <span class="wordmark" title="fresh, open, unassigned issues from 100★+ repos">open source <em>feed</em></span>
    <div class="nav-right">
      <span class="sync" id="sync" title="time until the poller fetches new issues from GitHub"></span>
      <button class="nav-bm" id="bm-toggle" title="your bookmarks (saved in this browser)">
        <svg viewBox="0 0 16 16"><path d="M3 2.75C3 1.784 3.784 1 4.75 1h6.5c.966 0 1.75.784 1.75 1.75v11.5a.75.75 0 0 1-1.227.579L8 11.722l-3.773 3.107A.751.751 0 0 1 3 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.91l3.023-2.489a.75.75 0 0 1 .954 0l3.023 2.49V2.75a.25.25 0 0 0-.25-.25Z"/></svg><span class="bm-label">Bookmarks</span><span class="cnt" id="bm-count">0</span>
      </button>
      <a class="nav-about" href="/about">About</a>
      <a class="rss" id="rss-link" href="/feed.xml" title="Atom feed for RSS readers. Keeps your current filters.">RSS</a>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>

<div class="shell">
  <aside class="sidebar">
    <div class="side-label">Quick filters</div>
    <div class="presets" id="presets">
      <button class="preset" data-labels="good first issue"><svg viewBox="0 0 16 16"><path d="M7.6 1.5H2.25a.75.75 0 0 0-.75.75V7.6c0 .2.08.39.22.53l6.15 6.15a.75.75 0 0 0 1.06 0l5.35-5.35a.75.75 0 0 0 0-1.06L8.13 1.72a.75.75 0 0 0-.53-.22Z"/><circle cx="4.75" cy="4.75" r="1"/></svg>good first issue</button>
      <button class="preset" data-labels="help wanted"><svg viewBox="0 0 16 16"><path d="M7.6 1.5H2.25a.75.75 0 0 0-.75.75V7.6c0 .2.08.39.22.53l6.15 6.15a.75.75 0 0 0 1.06 0l5.35-5.35a.75.75 0 0 0 0-1.06L8.13 1.72a.75.75 0 0 0-.53-.22Z"/><circle cx="4.75" cy="4.75" r="1"/></svg>help wanted</button>
      <button class="preset" data-labels="bug"><svg viewBox="0 0 16 16"><path d="M7.6 1.5H2.25a.75.75 0 0 0-.75.75V7.6c0 .2.08.39.22.53l6.15 6.15a.75.75 0 0 0 1.06 0l5.35-5.35a.75.75 0 0 0 0-1.06L8.13 1.72a.75.75 0 0 0-.53-.22Z"/><circle cx="4.75" cy="4.75" r="1"/></svg>bug</button>
      <button class="preset" data-labels="documentation,docs"><svg viewBox="0 0 16 16"><path d="M7.6 1.5H2.25a.75.75 0 0 0-.75.75V7.6c0 .2.08.39.22.53l6.15 6.15a.75.75 0 0 0 1.06 0l5.35-5.35a.75.75 0 0 0 0-1.06L8.13 1.72a.75.75 0 0 0-.53-.22Z"/><circle cx="4.75" cy="4.75" r="1"/></svg>docs</button>
      <button class="preset" data-min_stars="1000"><svg viewBox="0 0 16 16"><path d="M8 1.75l1.9 3.85 4.25.62-3.08 3 .73 4.23L8 11.45l-3.8 2 .73-4.23-3.08-3 4.25-.62Z"/></svg>+1k stars</button>
      <button class="preset" data-min_stars="10000"><svg viewBox="0 0 16 16"><path d="M8 1.75l1.9 3.85 4.25.62-3.08 3 .73 4.23L8 11.45l-3.8 2 .73-4.23-3.08-3 4.25-.62Z"/></svg>+10k stars</button>
    </div>
    <hr class="side-divider">
    <div class="side-label">Advanced</div>
    <form id="filters">
      <label>Language
        <select name="language" id="language">
          <option value="">all</option>
        </select>
      </label>
      <label>Min Stars (floor 100)
        <input type="number" name="min_stars" min="100" step="100" placeholder="100">
      </label>
      <label>Labels (any match)
        <input type="text" name="labels" placeholder="good first issue, bug">
      </label>
      <label>Limit
        <input type="number" name="limit" min="1" max="200" value="50">
      </label>
      <button type="button" class="clear-all" id="clear-all">Clear all</button>
    </form>
  </aside>

  <main class="main">
    <div class="list-head">
      <button class="filters-toggle" id="filters-toggle">☰ Filters</button>
      <span class="count"><b id="count">…</b><span class="sortedby" id="sortedby">· sorted by newest</span></span>
      <a class="bm-exit" id="bm-exit" href="#" hidden>← back to the feed</a>
      <div class="tools">
        <select id="sort" title="sort order">
          <option value="">newest</option>
          <option value="stars">most stars</option>
          <option value="comments">most comments</option>
        </select>
        <span class="search">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input type="text" id="search" placeholder="Search issues" autocomplete="off">
        </span>
      </div>
    </div>

    <ul id="list"></ul>
    <div id="message" class="empty" hidden></div>
    <button class="more" id="more" hidden>Load more</button>

    <footer>
      fresh, open, unassigned issues from 100★+ repos · updates every minute ·
      <a id="rss-footer" href="/feed.xml">subscribe via rss/atom</a> ·
      <a href="/about">about</a>
    </footer>
  </main>
</div>

<script>
  const REFRESH_MS = 60_000;
  const LAST_VISIT_KEY = 'issuefeed:lastVisit';
  // GitHub's own language colors: instantly recognizable to developers.
  const LANG_COLORS = {
    javascript: '#f1e05a', typescript: '#3178c6', python: '#3572a5',
    go: '#00add8', rust: '#dea584', java: '#b07219',
  };
  const LABEL_COLORS = {
    'bug': '#dc2626', 'good first issue': '#2563eb', 'help wanted': '#d97706',
    'enhancement': '#16a34a', 'documentation': '#7c3aed', 'docs': '#7c3aed',
  };
  // GitHub Octicons (MIT): the icons developers already know from github.com.
  const ICON_STAR = '<svg viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"/></svg>';
  const ICON_COMMENT = '<svg viewBox="0 0 16 16"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.458 1.458 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
  const ICON_BOOKMARK =
    '<svg viewBox="0 0 16 16">' +
    '<path class="p-outline" d="M3 2.75C3 1.784 3.784 1 4.75 1h6.5c.966 0 1.75.784 1.75 1.75v11.5a.75.75 0 0 1-1.227.579L8 11.722l-3.773 3.107A.751.751 0 0 1 3 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.91l3.023-2.489a.75.75 0 0 1 .954 0l3.023 2.49V2.75a.25.25 0 0 0-.25-.25Z"/>' +
    '<path class="p-fill" d="M3 2.75C3 1.784 3.784 1 4.75 1h6.5c.966 0 1.75.784 1.75 1.75v11.5a.75.75 0 0 1-1.227.579L8 11.722l-3.773 3.107A.751.751 0 0 1 3 14.25Z"/>' +
    '</svg>';
  const form = document.getElementById('filters');
  const list = document.getElementById('list');
  const message = document.getElementById('message');
  const countEl = document.getElementById('count');
  const sortedbyEl = document.getElementById('sortedby');
  const moreBtn = document.getElementById('more');
  const sortSel = document.getElementById('sort');
  const searchInput = document.getElementById('search');
  let timer = null;
  let searchTimer = null;
  let offset = 0;
  let firstLoad = true;

  // ---- bookmarks: full issue snapshots in localStorage, so a saved issue
  // survives even after retention deletes it from the server.
  const BM_KEY = 'issuefeed:bookmarks';
  let bookmarks = {};
  try { bookmarks = JSON.parse(localStorage.getItem(BM_KEY) || '{}'); } catch {}
  let bookmarksMode = false;
  const renderedIssues = new Map();
  function saveBookmarks() {
    localStorage.setItem(BM_KEY, JSON.stringify(bookmarks));
    document.getElementById('bm-count').textContent = Object.keys(bookmarks).length;
  }

  // ---- "next sync" countdown, driven by the poller's real last_poll_at.
  let lastPollAt = null;
  let pollIntervalSec = 300;
  async function loadStatus() {
    try {
      const res = await fetch('/status');
      const d = await res.json();
      lastPollAt = d.lastPollAt ? new Date(d.lastPollAt).getTime() : null;
      pollIntervalSec = d.pollIntervalSeconds || 300;
    } catch { /* countdown just hides */ }
  }
  function tickSync() {
    const el = document.getElementById('sync');
    if (!lastPollAt) { el.textContent = ''; return; }
    const remaining = lastPollAt + pollIntervalSec * 1000 - Date.now();
    if (remaining > 0) {
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      el.textContent = 'next sync ' + m + ':' + String(s).padStart(2, '0');
    } else {
      // Overdue (e.g. cron paused): a stuck "due" label reads as broken: hide instead.
      el.textContent = '';
    }
  }
  setInterval(tickSync, 1000);

  // "New since your last visit": baseline is when you PREVIOUSLY opened the
  // page; anything created after that is tagged NEW for this whole visit.
  const lastVisit = Number(localStorage.getItem(LAST_VISIT_KEY) || 0);
  localStorage.setItem(LAST_VISIT_KEY, String(Date.now()));

  function age(iso) {
    const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 90) return 'now';
    if (s < 3600) return Math.round(s / 60) + 'm';
    if (s < 86400) return Math.round(s / 3600) + 'h';
    return Math.round(s / 86400) + 'd';
  }

  function starFmt(n) {
    return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k' : String(n);
  }

  function esc(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function labelColor(l) {
    return LABEL_COLORS[l.toLowerCase()] || '#6b7280';
  }

  function formParams() {
    const d = new FormData(form);
    const p = new URLSearchParams();
    for (const k of ['language', 'min_stars', 'labels', 'limit']) {
      const v = (d.get(k) || '').toString().trim();
      if (v && !(k === 'limit' && v === '50')) p.set(k, v);
    }
    const q = searchInput.value.trim();
    if (q) p.set('q', q);
    if (sortSel.value) p.set('sort', sortSel.value);
    return p;
  }

  function syncUrl() {
    const q = formParams().toString();
    history.replaceState(null, '', q ? '?' + q : location.pathname);
    const rss = '/feed.xml' + (q ? '?' + q : '');
    document.getElementById('rss-link').href = rss;
    document.getElementById('rss-footer').href = rss;
  }

  function restoreFromUrl() {
    const p = new URLSearchParams(location.search);
    for (const k of ['language', 'min_stars', 'labels', 'limit']) {
      if (p.has(k)) form.elements[k].value = p.get(k);
    }
    if (p.has('q')) searchInput.value = p.get('q');
    if (p.has('sort')) sortSel.value = p.get('sort');
  }

  function markActivePresets() {
    const labels = form.elements['labels'].value.trim().toLowerCase();
    const stars = form.elements['min_stars'].value.trim();
    for (const btn of document.querySelectorAll('.preset')) {
      const active = !bookmarksMode && (
        (btn.dataset.labels && btn.dataset.labels.toLowerCase() === labels) ||
        (btn.dataset.min_stars && btn.dataset.min_stars === stars));
      btn.classList.toggle('active', !!active);
    }
    document.getElementById('bm-toggle').classList.toggle('active', bookmarksMode);
  }

  function render(issue, i) {
    const isFresh = lastVisit > 0 && new Date(issue.created_at).getTime() > lastVisit;
    const repoUrl = 'https://github.com/' + issue.repo_full_name;
    const langColor = LANG_COLORS[issue.language] || '#8b949e';
    const pills = issue.labels.map((l) => {
      const c = labelColor(l);
      return `<button class="pill label-chip" data-label="${esc(l)}"
        style="color:${c};background:color-mix(in srgb, ${c} 12%, var(--bg))">${esc(l)}</button>`;
    }).join('');
    return `
      <li class="issue${isFresh ? ' fresh' : ''}" style="animation-delay:${Math.min(i * 16, 180)}ms">
        <div class="row-main">
          <div class="title-line">
            ${isFresh ? '<span class="new-pill">NEW</span>' : ''}
            <a href="${esc(issue.url)}" target="_blank" rel="noopener">${esc(issue.title)}</a>
          </div>
          <div class="meta">
            <span class="lang"><i style="background:${langColor}"></i>${esc(issue.language)}</span>
            <a class="repo" href="${esc(repoUrl)}" target="_blank" rel="noopener" title="open repository">${esc(issue.repo_full_name)}#${issue.number}</a>
            <span class="stars">${ICON_STAR}${starFmt(issue.repo_stars)}</span>
            ${pills}
          </div>
        </div>
        <div class="row-side">
          <span class="age" data-created="${issue.created_at}" title="${issue.created_at}">${age(issue.created_at)}</span>
          <span class="comments${issue.comments > 0 ? ' has' : ''}" title="${issue.comments === 0 ? 'no discussion yet, truly up for grabs' : issue.comments + ' comment(s)'}">
            ${ICON_COMMENT}${issue.comments}
          </span>
          <button class="bm${bookmarks[issue.id] ? ' saved' : ''}" data-id="${esc(issue.id)}" title="${bookmarks[issue.id] ? 'remove bookmark' : 'bookmark (saved in this browser)'}">
            ${ICON_BOOKMARK}
          </button>
        </div>
      </li>`;
  }

  function showSkeletons(n = 7) {
    list.innerHTML = Array.from({ length: n }, () => '<li class="skel"></li>').join('');
  }

  const SORT_NAMES = { '': 'newest', stars: 'most stars', comments: 'most comments' };

  function renderBookmarks() {
    const saved = Object.values(bookmarks)
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    list.innerHTML = saved.map(render).join('');
    saved.forEach((i) => renderedIssues.set(i.id, i));
    moreBtn.hidden = true;
    message.hidden = saved.length > 0;
    message.className = 'empty';
    message.textContent = 'No bookmarks yet. Click the flag icon on any issue to save it here.';
    countEl.textContent = saved.length + ' bookmarked';
    sortedbyEl.textContent = '';
    document.getElementById('bm-exit').hidden = false;
    clearTimeout(timer);
    markActivePresets();
  }

  async function load({ append = false } = {}) {
    if (bookmarksMode) { renderBookmarks(); return; }
    document.getElementById('bm-exit').hidden = true;
    if (!append) offset = 0;
    if (firstLoad) { showSkeletons(); firstLoad = false; }
    try {
      const p = formParams();
      if (offset > 0) p.set('offset', String(offset));
      const res = await fetch('/issues?' + p);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      data.issues.forEach((i) => renderedIssues.set(i.id, i));
      const html = data.issues.map(render).join('');
      if (append) list.insertAdjacentHTML('beforeend', html);
      else list.innerHTML = html;
      loadStatus();
      const pageSize = Number(form.elements['limit'].value) || 50;
      moreBtn.hidden = data.issues.length < pageSize;
      message.hidden = list.children.length > 0;
      message.className = 'empty';
      message.textContent = 'No claimable issues match these filters. Try widening them.';
      const fresh = list.querySelectorAll('.fresh').length;
      countEl.textContent = list.children.length + ' issues';
      sortedbyEl.textContent = '· sorted by ' + SORT_NAMES[sortSel.value] + (fresh ? ' · ' + fresh + ' new since last visit' : '');
    } catch (err) {
      list.innerHTML = '';
      message.hidden = false;
      message.className = 'error';
      message.textContent = 'Failed to load: ' + err.message;
    }
    markActivePresets();
    clearTimeout(timer);
    // Auto-refresh only while on page 1, so "Load more" results aren't yanked away.
    if (offset === 0) timer = setTimeout(() => load(), REFRESH_MS);
  }

  async function loadLanguages() {
    try {
      const res = await fetch('/languages');
      const data = await res.json();
      const select = document.getElementById('language');
      const wanted = new URLSearchParams(location.search).get('language');
      for (const lang of data.languages) {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.textContent = lang;
        select.appendChild(opt);
      }
      if (wanted) select.value = wanted;
    } catch { /* dropdown just stays at "all" */ }
  }

  document.getElementById('bm-toggle').addEventListener('click', () => {
    bookmarksMode = !bookmarksMode;
    load();
  });

  document.getElementById('bm-exit').addEventListener('click', (e) => {
    e.preventDefault();
    bookmarksMode = false;
    load();
  });

  document.getElementById('presets').addEventListener('click', (e) => {
    const btn = e.target.closest('.preset');
    if (!btn) return;
    bookmarksMode = false;
    if (btn.dataset.labels) {
      form.elements['labels'].value = btn.classList.contains('active') ? '' : btn.dataset.labels;
    } else if (btn.dataset.min_stars) {
      form.elements['min_stars'].value = btn.classList.contains('active') ? '' : btn.dataset.min_stars;
    }
    syncUrl();
    load();
  });

  document.getElementById('clear-all').addEventListener('click', () => {
    bookmarksMode = false;
    form.elements['labels'].value = '';
    form.elements['min_stars'].value = '';
    form.elements['language'].value = '';
    searchInput.value = '';
    sortSel.value = '';
    syncUrl();
    load();
  });

  list.addEventListener('click', (e) => {
    const bm = e.target.closest('.bm');
    if (bm) {
      const id = bm.dataset.id;
      if (bookmarks[id]) {
        delete bookmarks[id];
        bm.classList.remove('saved');
        if (bookmarksMode) bm.closest('li').remove();
      } else if (renderedIssues.has(id)) {
        bookmarks[id] = renderedIssues.get(id);
        bm.classList.add('saved');
      }
      saveBookmarks();
      if (bookmarksMode && !list.children.length) renderBookmarks();
      return;
    }
    const chip = e.target.closest('.label-chip');
    if (!chip) return;
    bookmarksMode = false;
    form.elements['labels'].value = chip.dataset.label;
    syncUrl();
    load();
  });

  moreBtn.addEventListener('click', () => {
    offset += Number(form.elements['limit'].value) || 50;
    load({ append: true });
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    document.activeElement?.blur();
    bookmarksMode = false;
    document.body.classList.remove('side-open');
    syncUrl();
    load();
  });

  // Sidebar filters apply on their own: the select instantly, typed fields
  // debounced like the search box, so no Apply button is needed.
  const applyFilters = () => { bookmarksMode = false; syncUrl(); load(); };
  // Blur once the choice is made so the focus ring doesn't linger.
  form.elements['language'].addEventListener('change', (e) => { e.target.blur(); applyFilters(); });
  let filterTimer;
  for (const name of ['min_stars', 'labels', 'limit']) {
    form.elements[name].addEventListener('input', () => {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(applyFilters, 450);
    });
  }

  sortSel.addEventListener('change', () => { sortSel.blur(); bookmarksMode = false; syncUrl(); load(); });
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === 'Escape') searchInput.blur(); });
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { bookmarksMode = false; syncUrl(); load(); }, 350);
  });

  // Mobile sidebar drawer
  document.getElementById('filters-toggle').addEventListener('click', () => {
    document.body.classList.toggle('side-open');
  });
  document.getElementById('backdrop').addEventListener('click', () => {
    document.body.classList.remove('side-open');
  });

  // Ages tick live so the page never looks frozen between refreshes.
  setInterval(() => {
    for (const el of document.querySelectorAll('.age')) {
      el.textContent = age(el.dataset.created);
    }
  }, 30_000);

  restoreFromUrl();
  syncUrl();
  saveBookmarks();
  loadStatus().then(tickSync);
  loadLanguages();
  load();
</script>
</body>
</html>
